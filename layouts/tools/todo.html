{{ define "main" }}
<div class="todo-container" style="max-width: 600px; margin: 60px auto; padding: 0 20px;">
    <h1 style="font-size: 28px; margin-bottom: 20px;">我的待办清单</h1>

    <div style="display: flex; gap: 10px; margin-bottom: 24px;">
        <input id="todo-input" type="text" placeholder="输入待办事项..." 
               style="flex: 1; padding: 10px 16px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 16px; outline: none;">
        <button id="add-btn" style="padding: 10px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600;">
            添加
        </button>
    </div>

    <ul id="todo-list" style="list-style: none; padding: 0; margin: 0;">
        <!-- 由 JavaScript 动态渲染 -->
    </ul>

    <div style="margin-top: 16px; display: flex; gap: 16px; font-size: 14px; color: #6b7280;">
        <span>总计：<span id="total-count">0</span> 项</span>
        <span>已完成：<span id="done-count">0</span> 项</span>
    </div>
</div>

<style>
    /* 给 todo 项加一点点交互动画 */
    .todo-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: #799dc1;
        border-radius: 8px;
        margin-bottom: 8px;
        border: 1px solid #e5e7eb;
        transition: background 0.2s;
    }
    .todo-item:hover {
        background: #f3f4f6;
    }
    .todo-item .text {
        flex: 1;
        font-size: 16px;
    }
    .todo-item .text.done {
        text-decoration: line-through;
        color: #9ca3af;
    }
    .todo-item .delete-btn {
        background: none;
        border: none;
        color: #ef4444;
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
    }
    .todo-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: #3b82f6;
    }
    /* 暗色适配（如果你博客有暗色模式） */
    body.dark .todo-item {
        background: #1f2937;
        border-color: #374151;
    }
    body.dark .todo-item:hover {
        background: #374151;
    }
    body.dark .todo-item .text.done {
        color: #6b7280;
    }
</style>

<script>
    (function() {
        // ----- 数据管理 -----
        let todos = [];

        // 从 localStorage 加载
        function loadTodos() {
            try {
                const stored = localStorage.getItem('my_todos');
                if (stored) todos = JSON.parse(stored);
            } catch (e) { todos = []; }
        }

        // 保存到 localStorage
        function saveTodos() {
            localStorage.setItem('my_todos', JSON.stringify(todos));
        }

        // ----- 渲染 -----
        const listEl = document.getElementById('todo-list');
        const totalEl = document.getElementById('total-count');
        const doneEl = document.getElementById('done-count');

        function render() {
            if (todos.length === 0) {
                listEl.innerHTML = `<li style="text-align:center; color:#9ca3af; padding:40px 0;">✨ 还没有待办事项，添加一条吧</li>`;
            } else {
                listEl.innerHTML = todos.map((todo, index) => `
                    <li class="todo-item">
                        <input type="checkbox" ${todo.done ? 'checked' : ''} data-index="${index}">
                        <span class="text ${todo.done ? 'done' : ''}">${escapeHtml(todo.text)}</span>
                        <button class="delete-btn" data-index="${index}">✕</button>
                    </li>
                `).join('');
            }

            // 更新统计
            totalEl.textContent = todos.length;
            doneEl.textContent = todos.filter(t => t.done).length;

            // ----- 绑定事件（事件委托）-----
            listEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', function() {
                    const idx = parseInt(this.dataset.index);
                    todos[idx].done = this.checked;
                    saveTodos();
                    render();
                });
            });

            listEl.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    todos.splice(idx, 1);
                    saveTodos();
                    render();
                });
            });
        }

        // 简单的防 XSS 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ----- 添加逻辑 -----
        const inputEl = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');

        function addTodo() {
            const text = inputEl.value.trim();
            if (text === '') {
                alert('请输入内容');
                return;
            }
            todos.push({ text: text, done: false });
            saveTodos();
            render();
            inputEl.value = '';
            inputEl.focus();
        }

        addBtn.addEventListener('click', addTodo);
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addTodo();
        });

        // ----- 初始化 -----
        loadTodos();
        render();
    })();
</script>
{{ end }}
